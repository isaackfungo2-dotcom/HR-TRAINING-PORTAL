server.port=8083
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5432/hr_training_portal
spring.datasource.username=postgres
spring.datasource.password=Westlifes93@
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=hrTrainingPortalSecretKeyThatIsAtLeast256BitsLongAndSecureForJwtSigningOperationsInProductionPleaseChange
