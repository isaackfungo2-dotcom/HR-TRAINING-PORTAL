<div class="app-layout" *ngIf="isLoggedIn; else loginTemplate">
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.66 4 3 9 3s9-1.34 9-3v-5"/></svg>
      </div>
      <span class="brand-title">HR Training Portal</span>
    </div>
    <nav class="nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()"><span class="nav-icon">&#128200;</span>Dashboard</a>
      <a class="nav-item" routerLink="/requests" routerLinkActive="active" (click)="closeSidebar()"><span class="nav-icon">&#128196;</span>My Requests</a>
      <a class="nav-item" routerLink="/new-request" routerLinkActive="active" (click)="closeSidebar()"><span class="nav-icon">&#10133;</span>New Request</a>
      <a class="nav-item" routerLink="/supervisor" routerLinkActive="active" *ngIf="canSupervise()" (click)="closeSidebar()"><span class="nav-icon">&#9989;</span>Supervisor Review</a>
      <a class="nav-item" routerLink="/hr-review" routerLinkActive="active" *ngIf="canHr()" (click)="closeSidebar()"><span class="nav-icon">&#128736;</span>HR Review</a>
      <a class="nav-item" routerLink="/users" routerLinkActive="active" *ngIf="canAdmin()" (click)="closeSidebar()"><span class="nav-icon">&#128101;</span>Users & Roles</a>
    </nav>
    <div style="margin-top:auto; padding:16px; border-top:1px solid #374151;">
      <div style="color:#9ca3af; font-size:.85rem;">{{ userName }}</div>
      <div style="color:#6b7280; font-size:.75rem; text-transform:capitalize;">{{ userRole }}</div>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </aside>
  <div class="sidebar-backdrop" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>
  <div class="main-area">
    <header class="top-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="header-title">HR Training Request Portal</h1>
      </div>
      <div class="header-right">
        <span class="bell" routerLink="/notifications" title="Notifications">&#128276;</span>
        <span style="font-size: .9rem; color:#374151;">{{ userName }}</span>
      </div>
    </header>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #loginTemplate>
  <router-outlet></router-outlet>
</ng-template>
